{% extends 'gestion_tutorias/base.html' %}

{% block title %}Materias{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-book"></i> Materias</h2>
    <a href="{% url 'materia_create' %}" class="btn btn-primary">+ Nueva Materia</a>
</div>

<div class="card">
    <div class="card-body">
        <table class="table table-hover">
            <thead class="table-dark">
                <tr><th>Código</th><th>Nombre</th><th>Acciones</th></tr>
            </thead>
            <tbody id="tabla-materias">
            </tbody>
        </table>
    </div>
</div>
<script>
document.addEventListener('DOMContentLoaded', function() {

    console.log("CARGANDO MATERIAS");

    fetch('/api/materias/')
    .then(response => response.json())
    .then(data => {

        console.log(data);

        let tabla = document.getElementById('tabla-materias');
        tabla.innerHTML = '';

        data.forEach(m => {

            tabla.innerHTML += `
                <tr>
                    <td>${m.codigo}</td>
                    <td>${m.nombre}</td>
                    <td>API REST</td>
                </tr>
            `;

        });

    });

});
</script>
{% endblock %}

{% block extra_js %}
{% endblock %}
